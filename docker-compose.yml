services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-finastra}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-finastra}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      PORT: 4000
      APP_ORIGIN: http://localhost:3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-finastra}?schema=public
      JWT_ACCESS_SECRET: replace-with-a-long-random-secret
      JWT_REFRESH_SECRET: replace-with-a-long-random-secret
      REDIS_URL: redis://redis:6379
      COOKIE_DOMAIN: localhost
      UPLOAD_BASE_URL: http://localhost:4000/uploads
      SEED_ON_BOOT: "true"
    ports:
      - "${API_PORT:-4000}:4000"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:${API_PORT:-4000}/api/v1
        API_INTERNAL_URL: http://api:4000/api/v1
        NEXT_PUBLIC_SITE_URL: http://localhost:${WEB_PORT:-3000}
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:${API_PORT:-4000}/api/v1
      API_INTERNAL_URL: http://api:4000/api/v1
      NEXT_PUBLIC_SITE_URL: http://localhost:${WEB_PORT:-3000}
    ports:
      - "${WEB_PORT:-3000}:3000"

volumes:
  postgres_data:
  redis_data:
