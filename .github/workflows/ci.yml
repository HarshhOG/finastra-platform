name: CI

on:
  push:
    branches:
      - main
      - staging
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install
        run: npm install

      - name: Prisma generate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/finastra?schema=public
        run: npm run prisma:generate

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build:all
